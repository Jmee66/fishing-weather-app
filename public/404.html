<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>FishWeather</title>
    <script>
      // SPA redirect trick pour GitHub Pages avec sous-dossier (/fishing-weather-app/)
      // Redirige vers index.html en encodant le chemin dans ?p=
      var l = window.location
      var base = '/fishing-weather-app'
      var path = l.pathname.slice(base.length) || '/'
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '/?p=' + encodeURIComponent(path + l.search + l.hash)
      )
    </script>
  </head>
  <body></body>
</html>
