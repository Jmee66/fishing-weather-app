name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_OWM_API_KEY: ${{ secrets.VITE_OWM_API_KEY }}
          VITE_MF_API_KEY: ${{ secrets.VITE_MF_API_KEY }}
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
          VITE_SHOM_API_KEY: ${{ secrets.VITE_SHOM_API_KEY }}
          VITE_COPERNICUS_USERNAME: ${{ secrets.VITE_COPERNICUS_USERNAME }}
          VITE_COPERNICUS_PASSWORD: ${{ secrets.VITE_COPERNICUS_PASSWORD }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: ""
