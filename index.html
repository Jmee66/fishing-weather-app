    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f4c81" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="FishWeather - Meteo Peche &amp; Navigation" />
    <meta property="og:description" content="Meteo marine, cartographie, marees et conditions de peche" />
    <meta property="og:type" content="website" />
    <title>FishWeather</title>
    <script>
      // Restaure l'URL encodée par 404.html (SPA redirect trick pour GitHub Pages)
      (function() {
        var qs = window.location.search.slice(1)
        var match = qs.match(/(?:^|&)p=([^&]*)/)
        if (match) {
          var decoded = decodeURIComponent(match[1])
          var base = '/fishing-weather-app'
          window.history.replaceState(null, null, base + decoded)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
